<!DOCTYPE html>



<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <title>Integrated Dashboard :: WA Data Breaches</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>



</head>

<body>



<h1>Integrated Dashboard</h1>
<p>Click on the donut slices filter charts.</p>


<!--&lt;!&ndash;lin svg -->
<h3>Monthly Residents Affected </h3>


<svg id="line-svg"></svg>




<!--bar plus cause legend-->
<h3>Breach Events by Year</h3>

<svg id="bar-svg"></svg>




<!--donut legend -->
<h3>Information Types Compromised</h3>
<svg id="donut-svg"></svg>

<div id="donut-legend" style="font-size:13px;margin-top:6px;"></div>


<!-- tt -->

<div id="tip" style="position:fixed;background:#fff;border:1px solid #555;padding:6px 10px;font-size:12px;pointer-events:none;opacity:0;"></div>



<script>




console.log('startup ...');

// data
const _dataIn = 'Data_Breach_Notifications_Affecting_Washington_Residents__Personal_Information_Breakdown_.csv';


// color mapping ....


// Tableau-10 palette used prof recommendations
const _INFO_COLOR_PAL = d3.schemeTableau10;


// tip handle
const _tt = d3.select('#tip');




// filter states
//
let _filterInfoT = null; // like 'Social Security Number'


// global data
let _allBreachData = []; // de-duplicated rows
let _infoTypeAll = []; // top info types
let _infoColorMapping;     // Map<string, color> for donut slices









// load
console.log('Loading');
const timeParseableCheck = d3.timeParse('%m/%d/%Y %I:%M:%S %p');

d3.csv(_dataIn).then(
        raw => {


  console.log(`CSV loaded. `);



  // Deduplicate by breach Id
  const _seenID = new Set();

  raw.forEach(r => {

    // safety
    if (_seenID.has(r.Id)) return;

    _seenID.add(r.Id);

    const _foundDate = timeParseableCheck(r.DateAware);

    // safety
    if (!_foundDate) return;


    // add data
    _allBreachData.push({
      id:       r.Id,
      date: _foundDate,
      year:     _foundDate.getFullYear(),
      month:    d3.timeMonth(_foundDate),            // floored to 1st of month :: rollup key citation: https://d3js.org/d3-time#timeMonth
      cause:    r.DataBreachCause?.trim()  || 'Unknown',
      aff:      +r.WashingtoniansAffected  || 0,
    });

  });
  // console.log(`Chase CHeck 1`);




  // info type index uses all  raw rows
  // count unique ids
  const _infoMap = new Map();




  raw.forEach(r => {
    const info = r.InformationType?.trim() || 'Unknown';

    // init
    if (!_infoMap.has(info)) _infoMap.set(info, new Set());


    _infoMap.get(info).add(r.Id);
  });


  // Keep top 10 , too many to include by default

  _infoTypeAll = Array.from(_infoMap.entries())
    .map(([info, ids]) => ({ info, count: ids.size, ids })).sort((a, b) => b.count - a.count)
    .slice(0, 9);


  _infoColorMapping = new Map(_infoTypeAll.map((d, i) => [d.info, _INFO_COLOR_PAL[i]]));
  console.log('Info types', _infoTypeAll.map(d => d.info));




  // all four charts, then run the first full update
  createLine();

  createBar();
  createDonut();


  manageState();



});



// sum up fields
// sums residents affected per calendar month - used by line and filtered

function sumMonthlyVals(rows) {

  // citation: https://d3js.org/d3-array/group#rollups
  return d3.rollups(rows, v => d3.sum(v, _r => _r.aff), d => d.month)
    .map(([date, total]) => ({ date, total })).sort((a, b) => a.date - b.date);
}






// filtered rows
// all currently active filter dimensions -  update cycle starts here so all charts start at same data settings
// the coordinated filtering design below (ID-join via _infoMap + single filtered subset passed to all charts)
// was built with help from generative ai
// steps: 1 - build _infoMap for wtores the breach ids for each info type (SS # for example)
// step 2 - when applying filters, look up the breach ids for the selected info type and then filter _allBreachData for those IDs
// step 3 - _applyFilters runs and gives the results to the bar and line chart updaters, so everything updates at once (donut is exempt)
// key is that the dataset has multiple rows per ID b/c there are multiple info types, we need to get distinct count and use ID to do cross dataset lookups
//
function _applyFilters() {
  let _rv = _allBreachData;

  // info type filter
  if (_filterInfoT) {
    const _matchingEntry = _infoTypeAll.find(d => d.info === _filterInfoT);

    //
    if (_matchingEntry) _rv = _rv.filter(d => _matchingEntry.ids.has(d.id));
  }

  return _rv;
}




// state update
// on filter change, Computes filtered rows once, passes the same subset to charts
function manageState() {

  const _dataRowsActive = _applyFilters();

  // console.log(`updateAll() calld`);

  updateLineChart(_dataRowsActive);
  updateBarChart(_dataRowsActive);

  updateDonutChart();    // no change here for obvious reasons
}



// now line chart
// updateLineChart() binds data and redraws after filtering

function createLine() {

  const _sizeSettings = { top: 20, right: 20, bottom: 42, left: 82 };

  const W0 = 900, _h = 200;

  const _finalWidth  = W0 - _sizeSettings.left - _sizeSettings.right;


  const _lineSvg = d3.select('#line-svg')
    .attr('width', W0).attr('height', _h + _sizeSettings.top + _sizeSettings.bottom);



  // clip path enforces min / max
  // citation : https://observablehq.com/@eesur/svg-clippath-using-d3 which helped me get started
  _lineSvg.append('defs').append('clipPath').attr('id', 'line-clip').append('rect').attr('width', _finalWidth).attr('height', _h);




  const _lineGrp = _lineSvg.append('g').attr('transform', `translate(${_sizeSettings.left},${_sizeSettings.top})`);
  _lineG = _lineGrp;


  _lnX = d3.scaleTime().range([0, _finalWidth]);
  _lnY = d3.scaleLinear().range([_h, 0]);


  // curveMonotoneX gives a smooth line that preserves monotonicity
  // citation: https://d3js.org/d3-shape/curve#curveMonotoneX
  // citation: https://d3js.org/d3-shape/area
  _lineAreaGenerator = d3.area().x(d => _lnX(d.date)).y0(_h).y1(d => _lnY(d.total)).curve(d3.curveMonotoneX);
  _lineLineGenerator = d3.line().x(d => _lnX(d.date)).y(d => _lnY(d.total)).curve(d3.curveMonotoneX);


  // data is bound in chart updater
  _lineGrp.append('path').attr('class', 'line-area').attr('opacity', 0.3).attr('clip-path', 'url(#line-clip)');
  _lineGrp.append('path').attr('class', 'line-stroke').attr('fill', 'none').attr('stroke-width', 2).attr('clip-path', 'url(#line-clip)');



  // axis groups
  _lineGrp.append('g').attr('class', 'x-axis').attr('transform', `translate(0,${_h})`);
  _lineGrp.append('g').attr('class', 'y-axis');



  _lineGrp.append('text').attr('x', _finalWidth / 2).attr('y', _h + 35).attr('text-anchor', 'middle').text('Year');
  _lineGrp.append('text').attr('transform', 'rotate(-90)').attr('x', -_h / 2).attr('y', -68).attr('text-anchor', 'middle').text('Residents Affected');


  // console.log('Line chart done.');
}





// line updater
// binds filtered monthly data and redraws paths
// The x/y domain always spans the full dataset so the axis never changes
function updateLineChart(rows) {

  const _allData         = sumMonthlyVals(_allBreachData);


  const _summed = sumMonthlyVals(rows.length ? rows : _allBreachData);


  

  _lnX.domain(d3.extent(_allData, d => d.date));
  _lnY.domain([0, d3.max(_allData, d => d.total) * 1.08]).nice(); //


  //  match the selected info type, otherwise use def
  const color = _filterInfoT ? _infoColorMapping.get(_filterInfoT) : 'gray';

  // .datum binds a single value to the selection https://d3js.org/d3-selection/joining#selection_datum
  _lineG.select('.line-area').datum(_summed).attr('d', _lineAreaGenerator).attr('fill', color);
  _lineG.select('.line-stroke').datum(_summed).attr('d', _lineLineGenerator).attr('stroke', color);


  // axes

  _lineG.select('.x-axis').call(d3.axisBottom(_lnX).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat('%Y')));
  _lineG.select('.y-axis').call(d3.axisLeft(_lnY).ticks(6).tickFormat(d3.format('.2s')));
  
}




// one bar per year 
// color follows the selected info type ....
function createBar() {
  
  
  const _marg = { top: 10, right: 20, bottom: 42, left: 52 };
  const W0 = 900, H = 200;
  const _fullWidth  = W0 - _marg.left - _marg.right;

  
  const _barSvg = d3.select('#bar-svg')
    .attr('width', W0)
    .attr('height', H + _marg.top + _marg.bottom);

  
  
  const _barGroup = _barSvg.append('g').attr('transform', `translate(${_marg.left},${_marg.top})`);
  
  _barG = _barGroup;

  
  
  // x/y scales
  _barX = d3.scaleBand().range([0, _fullWidth]).padding(0.18);
  _barY = d3.scaleLinear().range([H, 0]);

  // axes
  _barGroup.append('g').attr('class', 'x-axis').attr('transform', `translate(0,${H})`);
  _barGroup.append('g').attr('class', 'y-axis');
  _barGroup.append('text').attr('x', _fullWidth / 2).attr('y', H + 35).attr('text-anchor', 'middle').text('Year');
  _barGroup.append('text').attr('transform', 'rotate(-90)').attr('x', -H / 2).attr('y', -42).attr('text-anchor', 'middle').text('Breach Events');

  
  // console.log('Bar chart debugger ');
}

// now update bar on clicks 
function updateBarChart(_rws) {
  // show all years on x axis so bars don't disappear
  
  
  const _yrs = [...new Set(_allBreachData.map(d => d.year))].sort();
  _barX.domain(_yrs);
  
  

  const _cntByYear = d3.rollup(_rws, v => v.length, d => d.year);
  _barY.domain([0, d3.max(_yrs, y => _cntByYear.get(y) || 0) * 1.12 || 1]).nice();

  // default to gray 
  const _col = _filterInfoT ? _infoColorMapping.get(_filterInfoT) : 'gray';

 //
  _barG.selectAll('.bar').data(_yrs, d => d)
    .join(
      enter => enter.append('rect').attr('class', 'bar'),
      update => update,
      exit   => exit.remove()
    ).attr('x',       y => _barX(y))
    .attr('width',   _barX.bandwidth())
    .attr('y',       y => _barY(_cntByYear.get(y) || 0))
    .attr('height',  y => Math.max(0, _barY(0) - _barY(_cntByYear.get(y) || 0)))
    .attr('fill',    _col)
    .attr('opacity', 0.85)
          // tooltip
    .on('mousemove', (ev, y) => {
      const count = _cntByYear.get(y) || 0;
      _tt.html(`<b>${y}</b><br>Events: ${d3.format(',')(count)}`)
         .style('left', (ev.clientX + 12) + 'px')
         .style('top',  (ev.clientY - 12) + 'px')
         .style('opacity', 1);
    }) 
          // tooltip
    .on('mouseleave', () => _tt.style('opacity', 0));


  // axes
  _barG.select('.x-axis').call(d3.axisBottom(_barX).tickFormat(d3.format('d')));
  _barG.select('.y-axis').call(d3.axisLeft(_barY).ticks(5));


  console.log(`Bar chart updated::  ${_yrs.length} years`);
}




// finally donut - key to it all !!!!
// Shows  types as arc proportions. no filtering
// clicking a slice sets filterInfoType; clicking again clears


function createDonut() {

  const _r = 120;
  const _width = _r * 2 + 20, _Height = _r * 2 + 20;

  const _donutSvg = d3.select('#donut-svg').attr('width', _width).attr('height', _Height);
  //

  _donutG = _donutSvg.append('g').attr('transform', `translate(${_width / 2},${_Height / 2})`);



  // arc() builds SVG path data for pie slices https://d3js.org/d3-shape/arc
  // d3.pie() computes start/end angles from data values -  https://d3js.org/d3-shape/pie
  _donutArc = d3.arc().innerRadius(0).outerRadius(_r);

  _donutPie = d3.pie().value(d => d.count).sort(null);      // sort preserves original order



  // info type  legend :: same colors as the slices
  const _leg = document.getElementById('donut-legend');


  //
  _infoTypeAll.forEach((d, i) => {

    const _addedSpan = document.createElement('span');


    _addedSpan.style.cursor = 'pointer';
    //
    _addedSpan.innerHTML =
      `<svg width="12" height="12" style="vertical-align:middle">` +
      `<rect width="11" height="11" rx="2" fill="${_INFO_COLOR_PAL[i]}"/></svg> ${d.info} &nbsp;&nbsp;`;


    _addedSpan.addEventListener('click', () => {
      _filterInfoT = _filterInfoT === d.info ? null : d.info;
      console.log(`filterInfoType = ${_filterInfoT}`);
      manageState(); // update state
    });


    _leg.appendChild(_addedSpan);

  });
  // console.log('Donut');
}

// update bar on click
function updateDonutChart() {

  const _pieArcs = _donutPie(_infoTypeAll);

  //
  _donutG.selectAll('path').data(_pieArcs, d => d.data.info)
    .join(
      enter => enter.append('path')
        .attr('fill',   d => _infoColorMapping.get(d.data.info))
        .attr('stroke', '#fff').attr('stroke-width', 1).attr('cursor', 'pointer')
              // on click
        .on('click', (ev, d) => {
          // toggle
          _filterInfoT = _filterInfoT === d.data.info ? null : d.data.info;
          console.log(`filterInfoType = ${_filterInfoT}`);
          manageState();
        })
              // tooltip
        .on('mousemove', (ev, d) => {
          // arc angle span over full circle = slice percent https://d3js.org/d3-shape/pie#pie-angles
          const pct = ((d.endAngle - d.startAngle) / (2 * Math.PI) * 100).toFixed(1);
          _tt.html(`<b>${d.data.info}</b><br>Incidents: ${d3.format(',')(d.data.count)}<br>Share: ${pct}%`)
             .style('left', (ev.clientX + 12) + 'px')
             .style('top',  (ev.clientY - 12) + 'px')
             .style('opacity', 1);
        })
              // tooltip
        .on('mouseleave', () => _tt.style('opacity', 0)),
      update => update,
      exit   => exit.remove()
    )
          // update
    .attr('d', _donutArc)


    // dim all non-selected slices

    .attr('opacity', d => _filterInfoT ? (d.data.info === _filterInfoT ? 1 : 0.2) : 1);

  console.log('check 67667');
}










</script>

</body>


</html>
